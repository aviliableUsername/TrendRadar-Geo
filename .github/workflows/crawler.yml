name: Get Hot News

# Daily crawl with weekly geography report automation.
on:
  schedule:
    # 每天北京时间 08:00 运行。GitHub Actions 使用 UTC，因此这里是 00:00 UTC。
    # 周三运行时会额外生成并发送地理周报；其他日期只积累热榜数据。
    - cron: "0 0 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          clean: true

      # --------------------------------------------------------------------------------
      # 🚦 TRAFFIC CONTROL / 流量控制
      # --------------------------------------------------------------------------------
      # EN: Generates a random delay between 1 and 300 seconds (5 minutes).
      #     Critical for load balancing.
      #
      # CN: 生成 1 到 300 秒（5分钟）之间的随机延迟。
      #     这对负载均衡至关重要。
      # - name: Random Delay (Traffic Control)
      #   if: success()
      #   run: |
      #     echo "🎲 Traffic Control: Generating random delay..."
      #     DELAY=$(( ( RANDOM % 300 )  + 1 ))
      #     echo "⏸️  Sleeping for ${DELAY} seconds to spread the load..."
      #     sleep ${DELAY}s
      #     echo "▶️  Delay finished. Starting crawler..."

      - name: Set up Python
        if: success()
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        if: success()
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        if: success()
        run: uv sync --frozen --no-dev

      - name: Verify required files
        if: success()
        run: |
          if [ ! -f config/config.yaml ]; then
            echo "Error: Config missing"
            exit 1
          fi

      - name: Run crawler
        if: success()
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          WEWORK_WEBHOOK_URL: ${{ secrets.WEWORK_WEBHOOK_URL }}
          WEWORK_MSG_TYPE: ${{ secrets.WEWORK_MSG_TYPE }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER_URL: ${{ secrets.NTFY_SERVER_URL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          BARK_URL: ${{ secrets.BARK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          # 通用Webhook配置
          GENERIC_WEBHOOK_URL: ${{ secrets.GENERIC_WEBHOOK_URL }}
          GENERIC_WEBHOOK_TEMPLATE: ${{ secrets.GENERIC_WEBHOOK_TEMPLATE }}
          FREQUENCY_WORDS_PATH: config/custom/keyword/high_school_geography.txt
          # AI 配置（ai_analysis 和 ai_translation 共享模型配置）
          AI_FILTER_ENABLED: ${{ secrets.AI_API_KEY != '' && 'true' || 'false' }}
          AI_ANALYSIS_ENABLED: ${{ secrets.AI_API_KEY != '' && 'true' || 'false' }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_API_BASE: ${{ secrets.AI_API_BASE }}
          # 远程存储配置
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_REGION: ${{ secrets.S3_REGION }}
          GITHUB_ACTIONS: true
        run: uv run python -m trendradar

      - name: Persist crawl databases
        if: success()
        run: |
          python - <<'PY'
          from datetime import date, timedelta
          from pathlib import Path

          cutoff = date.today() - timedelta(days=14)
          for directory in (Path("output/news"), Path("output/rss")):
              directory.mkdir(parents=True, exist_ok=True)
              for db_path in directory.glob("*.db"):
                  try:
                      db_date = date.fromisoformat(db_path.stem)
                  except ValueError:
                      continue
                  if db_date < cutoff:
                      db_path.unlink()
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A output/news output/rss
          if git diff --cached --quiet; then
            echo "No crawl database changes to persist."
          else
            git commit -m "Update crawl data $(date -u +%F)"
            git push
          fi

      - name: Decide weekly report delivery
        if: success()
        id: report_gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_report=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$(date -u +%u)" = "3" ]; then
            echo "run_report=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_report=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate geography weekly report
        if: success() && steps.report_gate.outputs.run_report == 'true'
        run: uv run python -m trendradar.report.geography_weekly --days 7 --limit 15 --format both

      - name: Upload geography report artifact
        if: success() && steps.report_gate.outputs.run_report == 'true' && hashFiles('output/geography/*') != ''
        uses: actions/upload-artifact@v4
        with:
          name: geography-weekly-report
          path: output/geography/*

      - name: Email geography weekly report
        if: success() && steps.report_gate.outputs.run_report == 'true' && hashFiles('output/geography/*') != ''
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: 1426056128@qq.com
          EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
        run: uv run python -m trendradar.report.email_geography_weekly --report-dir output/geography
